name: Tests

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '{{cookiecutter.module_name}}/locale/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '{{cookiecutter.module_name}}/locale/**'

concurrency:
  group: {% raw %}${{ github.workflow }}-${{ github.head_ref || github.run_id }}{% endraw %}
  cancel-in-progress: true

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version-file: ".github/workflows/python-version.txt"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: extractions/setup-just@v3
      - name: Install pretalx and plugin
        run: uv pip install --system pretalx -e ".[dev]"
      - name: Run tests
        run: just test
